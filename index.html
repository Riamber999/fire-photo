<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>消防序拍 V1.0</title>

<style>
:root{--red:#c0392b;--green:#1a472a;--nb:#1a4a7c;--dark:#2c3e50;--bg:#f8f7f4;--card:#fff;--border:#e8e4dc;--gold:#d4a017;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','Microsoft JhengHei',-apple-system,sans-serif;background:var(--bg);color:#333;-webkit-font-smoothing:antialiased;}
.wrap{max-width:500px;margin:0 auto;padding:14px 12px 90px;min-height:100vh;}
.header{text-align:center;margin-bottom:14px;}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:16px;margin-bottom:5px;}
.badge-tp{color:var(--red);background:#fdf2f2;}
.badge-nb{color:var(--nb);background:#f0f4fa;}
h1{font-size:19px;font-weight:800;color:#1a1a1a;margin:2px 0;}
.sub{font-size:12px;color:#888;margin:2px 0;}
.card{background:var(--card);border-radius:10px;padding:13px;margin-bottom:8px;border:1px solid var(--border);}
.fl{font-size:11px;color:#888;margin-bottom:3px;font-weight:600;}
input[type=text],input[type=password],select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:8px;background:#fff;color:#333;}
input.dw{border-color:var(--gold);background:#fffef5;font-weight:700;color:#7d5a00;font-family:'Courier New',monospace;font-size:15px;}
.mbtn{width:100%;padding:13px;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-tp{background:var(--red);}.btn-nb{background:var(--nb);}.btn-g{background:var(--green);}.btn-d{background:var(--dark);}
.sb{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;color:#fff;white-space:nowrap;}
.nb-btn{flex:1;padding:9px 6px;background:#f5f5f0;color:#333;border:1px solid #ddd;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.nav-row{display:flex;gap:7px;margin-top:8px;}
.prog-bar{background:#e0e0d8;border-radius:8px;height:8px;margin-bottom:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;transition:width .3s;}
.fill-tp{background:var(--red);}.fill-nb{background:var(--nb);}
.sec-cat-label{font-size:12px;font-weight:800;color:var(--dark);margin:14px 0 6px 2px;display:flex;align-items:center;gap:6px;}
.sec-cat-label::after{content:"";flex:1;height:1px;background:#ddd;}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sec-title{font-size:13px;font-weight:800;}
.sec-btns{display:flex;gap:4px;}
.item-grid{display:flex;flex-wrap:wrap;gap:5px;}
.ibtn{padding:5px 8px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#f5f5f0;color:#333;text-align:left;line-height:1.4;position:relative;}
.ibtn.s-tp{background:var(--green);color:#fff;border:2px solid var(--green);font-weight:700;}
.ibtn.s-nb{background:var(--nb);color:#fff;border:2px solid var(--nb);font-weight:700;}
.ibtn.done-prev{border-style:dashed;border-color:#b0c8e8;}
.sbadge{font-size:9px;font-weight:700;padding:1px 3px;border-radius:3px;margin-left:3px;}
.s★{color:var(--red);background:#fdf2f2;}.s◎{color:#888;background:#f0f0ec;}
.stag{font-size:9px;padding:1px 4px;border-radius:3px;margin-left:3px;font-weight:700;}
.stag-cur{background:#27ae60;color:#fff;}
.stag-prev{background:#b0c8e8;color:#1a4a7c;}
.wb{background:#fffef5;border:2px solid var(--gold);position:relative;}
.wb-tag{position:absolute;top:-10px;left:14px;background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:4px;}
.wb-t{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.wb-t td{padding:4px 6px;border-bottom:1px solid #eee;}
.wbl{font-size:11px;color:#666;white-space:nowrap;}.wbv{font-weight:600;}
.wbr{font-weight:800!important;color:var(--red)!important;}
.wbd{font-weight:800!important;color:#7d5a00!important;font-family:'Courier New',monospace;font-size:14px;background:#fffbf0;padding:2px 6px;border-radius:4px;border:1px solid var(--gold);}
.ci{text-align:center;border-radius:10px;padding:12px;margin-bottom:8px;}
.ci.tp{background:var(--green);color:#fff;}.ci.nb{background:var(--nb);color:#fff;}
.ci .cc{font-size:10px;opacity:.7;}.ci .cn{font-size:15px;font-weight:800;line-height:1.4;margin:3px 0;}.ci .cf{font-size:10px;opacity:.5;word-break:break-all;}
.rem{background:#fffbf0;border:2px solid #f39c12;border-radius:10px;padding:11px 14px;margin-bottom:10px;}
.rem-t{font-size:12px;font-weight:800;color:#e67e22;margin-bottom:8px;}
.rem-r{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.rem-c{width:20px;height:20px;border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.rem-tx{font-size:12px;font-weight:600;color:#7d4800;line-height:1.5;}
.wm-i{background:#f0f4fa;border:1px solid #b0c8e8;border-radius:8px;padding:8px 12px;font-size:11px;color:#1a4a7c;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cam-pair{display:flex;gap:10px;}
.cam-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px;border-radius:8px;cursor:pointer;}
.cam-box.red{border:2.5px dashed var(--red);background:#fdf8f8;}
.cam-box.blue{border:2.5px dashed var(--nb);background:#f0f4fa;}
.cam-icon{font-size:28px;margin-bottom:3px;}
.cam-lbl{font-size:12px;font-weight:700;}
.cam-sub{font-size:10px;margin-top:2px;color:#aaa;}
.cam-box.red .cam-lbl{color:var(--red);}.cam-box.blue .cam-lbl{color:var(--nb);}
.photo-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0;}
.photo-thumb{flex-shrink:0;position:relative;text-align:center;}
.photo-thumb img{width:68px;height:68px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid #e0e0d8;}
.thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#e74c3c;border:none;border-radius:9px;color:#fff;font-size:11px;cursor:pointer;line-height:18px;text-align:center;padding:0;}
.thumb-no{font-size:9px;color:#888;margin-top:2px;}
.proc{display:flex;align-items:center;justify-content:center;min-height:80px;background:#f0f4fa;border-radius:10px;border:1px solid #b0c8e8;font-size:13px;font-weight:600;color:var(--nb);}
.rv-item{display:flex;gap:8px;align-items:center;padding:8px;}
.dot{width:22px;height:22px;border-radius:11px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.dot-ok{background:#27ae60;}.dot-miss{background:#e74c3c;}
.rv-th{width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;cursor:pointer;}
.warn{background:#fdf2f2;border:1px solid #e74c3c;}
.warn-t{font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px;}
.warn-i{font-size:11px;color:#922;margin-left:8px;margin-bottom:2px;}
.lock-sc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;}
.city-sc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;padding:20px;}
.city-btn{width:270px;padding:22px;border:none;border-radius:14px;font-size:17px;font-weight:800;color:#fff;cursor:pointer;letter-spacing:2px;}
.city-btn.tp{background:var(--red);}.city-btn.nb{background:var(--nb);}
.city-lbl{font-size:11px;opacity:.7;font-weight:400;letter-spacing:0;display:block;margin-top:4px;}
.hist-wrap{background:#f5fbf5;border:1.5px solid #a8d5a8;border-radius:9px;padding:10px 12px;margin-bottom:10px;}
.hist-lbl{font-size:11px;font-weight:800;color:#1a472a;margin-bottom:6px;}
.hist-row{display:flex;gap:6px;align-items:center;}
.hist-row select{margin-bottom:0;border-color:#a8d5a8;background:#fff;font-size:12px;color:#1a472a;font-weight:600;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.li{font-size:10px;display:flex;align-items:center;gap:4px;color:#666;}
.frow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.fbtn{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;border:1px solid #ddd;background:#f5f5f0;color:#555;cursor:pointer;}
.fbtn.on{background:var(--nb);color:#fff;border-color:var(--nb);}
.dl-info{background:#f0f8f0;border:1.5px solid #a8d5a8;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:11px;color:#1a472a;}
.bstack{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.user-chip{display:inline-block;background:#e8f0f8;color:var(--nb);font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;margin-bottom:4px;}
.share-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
.share-modal img{max-width:100%;max-height:55vh;border-radius:10px;object-fit:contain;box-shadow:0 4px 24px rgba(0,0,0,0.5);margin-bottom:10px;}
.share-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
</style>
</head>

// ════════════════════════════════════════
// （開、關）自動拆分
// ════════════════════════════════════════
function expandOC(items,prefix){
  const out=[];
  for(const i of items){
    if(/（開[、,，]?關）/.test(i.name)){
      out.push({...i,id:i.id+"-C",name:i.name.replace(/（開[、,，]?關）/,"（關）"),...prefix});
      out.push({...i,id:i.id+"-O",name:i.name.replace(/（開[、,，]?關）/,"（開）"),...prefix});
    }else{out.push({...i,...prefix});}
  }
  return out;
}

const NB_SECS=NB_CHECKLIST.flatMap(c=>c.subs.map(s=>({catId:c.catId,category:c.category,sub:s.sub,items:s.items})));
function nbAll(){return NB_SECS.flatMap(s=>expandOC(s.items,{category:s.category,catId:s.catId,sub:s.sub}));}
function tpAll(){return TP_CHECKLIST.flatMap(c=>expandOC(c.items,{category:c.category}));}
function safeName(n){return n.replace(/[\/\\:*?"<>|]/g,"_").trim()||"其他";}
function getFolder(item){return S.city==="NB"?safeName(item.sub||item.category):safeName(item.category);}

  locations:{},currentIdx:0,

  projectHistory:undefined,
  photoStatus:{}, // {itemId:{done,ts}} — 分次拍攝記錄

function normDate(v){if(!v)return"";const m=v.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);return m?`${m[1]}.${m[2].padStart(2,"0")}.${m[3].padStart(2,"0")}`:v;}
function hasPics(id){return(S.photos[id]||[]).length>0;}
function isPrev(id){return!!(S.photoStatus[id]?.done&&!hasPics(id));}

// ════════════════════════════════════════
// localStorage
// ════════════════════════════════════════
function tryLoadHistory(){
  try{const r=localStorage.getItem("fire-projects");S.projectHistory=r?JSON.parse(r):null;}
  catch(e){S.projectHistory=null;}render();
}
function saveHistory(d){
  try{
    const prev=Array.isArray(S.projectHistory)?S.projectHistory:[];
    const next=[d,...prev.filter(h=>!(h.projectName===d.projectName&&h.projectAddress===d.projectAddress))].slice(0,5);
    localStorage.setItem("fire-projects",JSON.stringify(next));S.projectHistory=next;
  }catch(e){}
}
function applyHistory(idx){
  if(idx==="")return;
  const h=S.projectHistory?.[Number(idx)];if(!h)return;
  // 保留目前選定的縣市，不用歷史覆蓋
  const currentCity=S.city;
  Object.assign(S,h);
  S.city=currentCity;
  render();
}
function psKey(){return"fire-ps-"+S.projectName+"_"+S.inspDate;}
function loadPS(){try{const r=localStorage.getItem(psKey());S.photoStatus=r?JSON.parse(r):{};}catch(e){S.photoStatus={};}}
function markDone(id){try{S.photoStatus[id]={done:true,ts:new Date().toISOString()};localStorage.setItem(psKey(),JSON.stringify(S.photoStatus));}catch(e){}}

// ════════════════════════════════════════
// 網址參數自動帶入（方法二核心）
// ════════════════════════════════════════
function applyUrlParams(){
  const p=new URLSearchParams(location.search);
  if(!p.has("n")&&!p.has("city"))return;
  if(p.get("city"))S.city=p.get("city");
  if(p.get("n"))   S.projectName=p.get("n");
  if(p.get("a"))   S.projectAddress=p.get("a");
  if(p.get("d"))   S.inspDate=normDate(p.get("d"));
  if(p.get("t"))   S.caseType=p.get("t");
  if(p.get("s"))   S.supervisorName=p.get("s");
  if(p.get("r"))   S.testerName=p.get("r");
  if(p.get("b"))   S.builderName=p.get("b");
  if(p.get("pw")){const u=USERS[p.get("pw")];if(u){S.currentUser=u;S.screen="project";}}
  history.replaceState({},"",location.pathname);
}

  if(S.screen==="shoot")   return renderShoot(el);
  if(S.screen==="review")  return renderReview(el);
}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;
  };
}

async function addWM(file,ds){
  return new Promise(res=>{
    const img=new Image(),tmp=URL.createObjectURL(file);
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=img.naturalWidth;c.height=img.naturalHeight;
      const ctx=c.getContext("2d");ctx.drawImage(img,0,0);URL.revokeObjectURL(tmp);
      const longEdge=Math.max(img.naturalWidth,img.naturalHeight);
      const fs=Math.max(Math.round(longEdge*0.028),18);
      ctx.font=`bold ${fs}px 'Courier New',Courier,monospace`;
      ctx.textBaseline="bottom";
      const tw=ctx.measureText(ds).width,mg=Math.round(longEdge*0.012);
      const tx=img.naturalWidth-tw-mg,ty=img.naturalHeight-mg;
      ctx.save();
      ctx.lineWidth=Math.max(Math.round(fs*0.18),2);
      ctx.lineJoin="round";
      ctx.strokeStyle="rgba(0,0,0,0.95)";ctx.strokeText(ds,tx,ty);
      ctx.fillStyle="#FFFFFF";ctx.fillText(ds,tx,ty);
      ctx.restore();
      c.toBlob(blob=>res({url:URL.createObjectURL(blob),blob}),"image/jpeg",0.95);
    };
    img.onerror=()=>res(null);img.src=tmp;
  });
}

async function handleCapture(input){
  const file=input.files?.[0];if(!file)return;
  const items=getSelected(),item=items[S.currentIdx];if(!item)return;
  const locEl=document.getElementById("locIn");if(locEl)S.locations[item.id]=locEl.value;
  S.processing=true;render();
  const r=await addWM(file,S.inspDate);S.processing=false;
  const idx=S.currentIdx;
  const baseF=S.city==="NB"?nbFname(item,idx):tpFname(item,idx);
  const existing=S.photos[item.id]||[];
  const seq=existing.length;
  const fname=seq===0?baseF:`${baseF}_${seq+1}`;
  const newP={url:r?r.url:URL.createObjectURL(file),blob:r?.blob,name:fname,folder:getFolder(item),ts:new Date().toISOString()};
  S.photos[item.id]=[...existing,newP];
  markDone(item.id);
  // 第1張才自動跳下一項
  if(seq===0&&S.currentIdx<items.length-1)S.currentIdx++;
  input.value="";render();
}

function openShareModal(id,pi=0){
  const pics=S.photos[id]||[];const p=pics[pi]||pics[0];if(!p)return;
  document.getElementById("shareModal")?.remove();
  const m=document.createElement("div");
  m.id="shareModal";m.className="share-modal";
  const canShare=navigator.share&&navigator.canShare&&p.blob;
  m.innerHTML=`
    <div style="color:#fff;font-size:13px;font-weight:700;margin-bottom:10px;text-align:center">${p.name}.jpg</div>
    <img src="${p.url}" style="max-width:100%;max-height:52vh;border-radius:10px;object-fit:contain;box-shadow:0 4px 24px rgba(0,0,0,0.5)">
    <div style="background:rgba(255,255,255,0.12);border-radius:8px;padding:8px 14px;margin:10px 0;text-align:center;color:#fff;font-size:12px;line-height:1.9">
      📱 手機：長按圖片 → 儲存至相簿<br>
      💻 電腦：右鍵圖片 → 另存圖片為…
    </div>
    <div class="share-btns">
      ${canShare?`<button class="sb" style="background:#25D366;font-size:13px;padding:9px 18px" onclick="nativeShare('${id}',${pi})">📤 分享 / LINE</button>`:""}
      <button class="sb" style="background:#1a4a7c;font-size:13px;padding:9px 18px" onclick="emailPhoto('${id}',${pi})">📧 Email</button>
      <button class="sb" style="background:#555;font-size:13px;padding:9px 18px" onclick="document.getElementById('shareModal').remove()">✕ 關閉</button>
    </div>`;
  m.addEventListener("click",e=>{if(e.target===m)m.remove();});
  document.body.appendChild(m);
}
async function nativeShare(id,pi){
  const pics=S.photos[id]||[];const p=pics[pi];if(!p||!p.blob)return;
  try{
    const f=new File([p.blob],p.name+".jpg",{type:"image/jpeg"});
    if(navigator.canShare({files:[f]})){await navigator.share({files:[f],title:p.name});return;}
  }catch(e){if(e.name==="AbortError")return;}
  alert("此裝置不支援直接分享，請長按圖片儲存");
}
function emailPhoto(id,pi){
  const pics=S.photos[id]||[];const p=pics[pi];if(!p)return;
  const sub=encodeURIComponent(`消防照片 — ${S.projectName} — ${p.name}`);
  const body=encodeURIComponent(`案場：${S.projectName}\n地址：${S.projectAddress}\n日期：${S.inspDate}\n照片：${p.name}.jpg\n\n（請先儲存照片，再手動附加至 Email）`);
  window.open(`mailto:?subject=${sub}&body=${body}`);
}

    const pics=S.photos[item.id]||[];const cnt=pics.length;
    h+=`<div class="card rv-item">
      <div class="dot ${cnt>0?"dot-ok":"dot-miss"}" style="font-size:${cnt>1?9:11}px">${cnt>1?cnt:cnt===1?"✓":"!"}</div>
      <div style="display:flex;gap:3px;flex-shrink:0">
        ${pics.slice(0,2).map((p,pi)=>`<img src="${p.url}" class="rv-th" onclick="openShareModal('${item.id}',${pi})">`).join("")}
        ${cnt>2?`<div style="width:34px;height:40px;background:#e0e0d8;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#666">+${cnt-2}</div>`:""}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600">${String(idx+1).padStart(2,"0")}. ${item.name}</div>
        <div style="font-size:10px;color:#999">${item.category}${item.sub?" ▸ "+item.sub:""}</div>
        ${cnt>0?`<div style="font-size:10px;color:${isNB?"#1a4a7c":"#1a472a"}">📁 ${getFolder(item)} ／ ${cnt}張</div>`:""}
      </div>
      ${cnt>0?`<button class="sb" style="background:#1a472a;flex-shrink:0;font-size:11px;padding:5px 9px" onclick="openShareModal('${item.id}',0)">💾</button>`:""}
    </div>`;
  });
  if(missing.length){
    h+=`<div class="card warn"><div class="warn-t">⚠ 尚有 ${missing.length} 項未拍攝</div>`;
    missing.forEach(m=>{h+=`<div class="warn-i">• ${m.name}</div>`;});
    h+=`<button class="sb" style="background:#c0392b;margin-top:8px" onclick="goToMissing()">繼續拍攝未完成項目</button></div>`;
  }
  h+=`<div class="bstack">
    ${S.downloading?`<div class="proc">⏳ 處理中，請稍候…</div>`:`
    ${isNB?`<button class="mbtn btn-nb" onclick="exportNBList()">📋 匯出新北市檔名清單（TXT）</button>`:""}
    <button class="mbtn" style="background:#27ae60" onclick="saveToDirectory()">📂 選擇資料夾下載（各設備分資料夾）</button>
    <button class="mbtn btn-g" onclick="downloadZip()">📦 ZIP 下載（各設備資料夾打包）</button>
    <button class="mbtn btn-d" onclick="exportJSON()">📄 匯出清單 JSON</button>`}
    <div class="nav-row">
      <button class="nb-btn" onclick="S.screen='shoot';render()">← 返回拍照</button>
      <button class="nb-btn" onclick="S.screen='select';render()" style="background:#e8f0f8;color:#1a4a7c;border-color:#b0c8e8">📋 修改選項</button>
    </div>
    <div class="nav-row">
      <button class="nb-btn" onclick="S.screen='project';render()">✏️ 修改案件</button>
      <button class="nb-btn" style="color:#c0392b;border-color:#e8b0b0"
        onclick="if(confirm('重選縣市將清除所有已拍照片，確定嗎？')){S.selectedIds=new Set();S.photos={};S.locations={};S.screen='city';render()}">🔄 重選縣市</button>
    </div>
  </div>`;
  el.innerHTML=h;
}
function goToMissing(){const items=getSelected(),idx=items.findIndex(i=>!hasPics(i.id));if(idx>=0){S.currentIdx=idx;S.screen="shoot";render();}}

async function saveToDirectory(){
  const items=getSelected(),done=items.filter(i=>hasPics(i.id));
  if(!done.length){alert("尚無已拍攝的照片");return;}
  if(!window.showDirectoryPicker){alert("此瀏覽器不支援選擇資料夾\n改用 ZIP 下載");return downloadZip();}
  let dir;
  try{dir=await window.showDirectoryPicker({mode:"readwrite"});}
  catch(e){if(e.name==="AbortError")return;return downloadZip();}
  S.downloading=true;render();
  try{
    let cnt=0;
    for(const item of done){
      for(const p of S.photos[item.id]||[]){
        let blob=p.blob;
        if(!blob){try{const r=await fetch(p.url);blob=await r.blob();}catch(e){continue;}}
        const fh=await dir.getDirectoryHandle(p.folder||getFolder(item),{create:true});
        const wh=await fh.getFileHandle(p.name+".jpg",{create:true});
        const w=await wh.createWritable();await w.write(blob);await w.close();cnt++;
      }
    }
    alert(`✅ 已儲存 ${cnt} 張，各設備資料夾已建立`);
  }catch(e){alert("儲存失敗："+e.message);downloadZip();}
  S.downloading=false;render();
}

async function downloadZip(){
  const items=getSelected(),done=items.filter(i=>hasPics(i.id));
  if(!done.length){alert("尚無已拍攝的照片");return;}
  S.downloading=true;render();
  try{
    const zip=new JSZip();
    for(const item of done){
      for(const p of S.photos[item.id]||[]){
        let blob=p.blob;
        if(!blob){try{const r=await fetch(p.url);blob=await r.blob();}catch(e){continue;}}
        zip.folder(p.folder||getFolder(item)).file(p.name+".jpg",blob);
      }
    }
    const content=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const url=URL.createObjectURL(content);
    const a=document.createElement("a");a.href=url;
    a.download=`消防照片_${S.projectName}_${S.inspDate}.zip`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  }catch(e){alert("ZIP 失敗："+e.message);}
  S.downloading=false;render();
}

function exportNBList(){
  const items=getSelected();
  let t=`新北市消防照片檔名清單\n案場：${S.projectName}\n地址：${S.projectAddress}\n日期：${S.inspDate}\n監造：${S.supervisorName}　測試：${S.testerName}\n${S.caseType?"類別："+S.caseType+"\n":""}\n${"─".repeat(55)}\n`;
  items.forEach((item,idx)=>{
    const pics=S.photos[item.id]||[];
    const baseF=nbFname(item,idx);
    t+=`${String(idx+1).padStart(3,"0")}. [${pics.length>0?`✓ ${pics.length}張`:"✗"}] 📁${getFolder(item)}\n`;
    pics.forEach((p,pi)=>{t+=`     ${pi+1}. ${p.name}.jpg\n`;});
    if(!pics.length)t+=`     ${baseF}.jpg\n`;
    if(S.locations[item.id])t+=`     位置：${S.locations[item.id]}\n`;
    t+="\n";
  });
  t+=`\n★ 既有設備可免附　◎ 耐燃耐熱鋪設可免附\n`;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([t],{type:"text/plain;charset=utf-8"}));
  a.download=`新北市照片清單_${S.projectName}.txt`;
  document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),300);
}

function exportJSON(){
  const items=getSelected();
  const obj={city:S.city==="NB"?"新北市":"台北市",operator:S.currentUser,
    project:{name:S.projectName,address:S.projectAddress,inspDate:S.inspDate,
      supervisor:S.supervisorName,tester:S.testerName,builder:S.builderName,...(S.caseType?{caseType:S.caseType}:{})},
    photos:items.map((item,idx)=>{
      const pics=S.photos[item.id]||[];
      const baseF=S.city==="NB"?nbFname(item,idx):tpFname(item,idx);
      return{seq:idx+1,folder:getFolder(item),label:item.name,
        files:pics.length?pics.map(p=>p.name+".jpg"):[baseF+".jpg"],
        location:S.locations[item.id]||"",status:pics.length?"captured":"missing",count:pics.length};
    }),
    summary:{total:items.length,captured:items.filter(i=>hasPics(i.id)).length,
      missing:items.filter(i=>!hasPics(i.id)).length,
      totalPhotos:items.reduce((s,i)=>s+(S.photos[i.id]||[]).length,0)}};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=`照片清單_${S.projectName}.json`;
  document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),300);
}

applyUrlParams();
render();
</script>
