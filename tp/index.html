:root{--red:#c0392b;--green:#1a472a;--dark:#2c3e50;--bg:#f8f7f4;--card:#fff;--border:#e8e4dc;--gold:#d4a017;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','Microsoft JhengHei',-apple-system,sans-serif;background:var(--bg);color:#333;-webkit-font-smoothing:antialiased;}

.fl{font-size:11px;color:#888;margin-bottom:3px;font-weight:600;}
input[type=text],input[type=password],select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:8px;background:#fff;color:#333;}
input.dw{border-color:var(--gold);background:#fffef5;font-weight:700;color:#7d5a00;font-family:'Courier New',monospace;font-size:15px;}
.mbtn{width:100%;padding:13px;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;background:var(--red);}
.mbtn.green{background:var(--green);}
.mbtn.dark{background:var(--dark);}
.sb{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;color:#fff;white-space:nowrap;}
.nb-btn{flex:1;padding:9px 6px;background:#f5f5f0;color:#333;border:1px solid #ddd;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.nav-row{display:flex;gap:7px;margin-top:8px;}
.prog-bar{background:#e0e0d8;border-radius:8px;height:8px;margin-bottom:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;background:var(--red);transition:width .3s;}
.sec-cat-label{font-size:12px;font-weight:800;color:var(--dark);margin:14px 0 6px 2px;display:flex;align-items:center;gap:6px;}
.sec-cat-label::after{content:"";flex:1;height:1px;background:#ddd;}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sec-title{font-size:13px;font-weight:800;color:var(--green);}
.sec-btns{display:flex;gap:4px;}
.item-grid{display:flex;flex-wrap:wrap;gap:5px;}
.ibtn{padding:5px 8px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#f5f5f0;color:#333;text-align:left;line-height:1.4;}

.stag-cur{background:#27ae60;color:#fff;}
.stag-prev{background:#b0c8e8;color:#1a4a7c;}
.wb{background:#fffef5;border:2px solid var(--gold);position:relative;}
.wb-tag{position:absolute;top:-10px;left:14px;background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:4px;}
.wb-t{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.wb-t td{padding:4px 6px;border-bottom:1px solid #eee;}
.wbl{font-size:11px;color:#666;white-space:nowrap;}
.wbv{font-weight:600;}
.wbr{font-weight:800!important;color:var(--red)!important;}
.wbd{font-weight:800!important;color:#7d5a00!important;font-family:'Courier New',monospace;font-size:14px;background:#fffbf0;padding:2px 6px;border-radius:4px;border:1px solid var(--gold);}

// ════════════════════════════════════════
// 工具
// ════════════════════════════════════════
function expandOC(items,prefix){
  const out=[];
  for(const i of items){
    if(/（開[、,，]?關）/.test(i.name)){
      out.push({...i,...prefix,id:i.id+"-C",name:i.name.replace(/（開[、,，]?關）/,"（關）")});
      out.push({...i,...prefix,id:i.id+"-O",name:i.name.replace(/（開[、,，]?關）/,"（開）")});
    }else{out.push({...i,...prefix});}
  }
  return out;
}
const SECS=CHECKLIST.flatMap(c=>c.subs.map(s=>({catId:c.catId,category:c.category,sub:s.sub,items:s.items})));
function allItems(){return SECS.flatMap(s=>expandOC(s.items,{category:s.category,catId:s.catId,sub:s.sub}));}
function safeName(n){return n.replace(/[\/\\:*?"<>|]/g,"_").trim()||"其他";}
function getFolder(item){return safeName(item.sub||item.category);}
function makeFname(item,idx){
  const seq=String(idx+1).padStart(2,"0"),sub=item.sub?`_${item.sub}`:"";
  return`${seq}_${item.catId}${item.category}${sub}_${item.name}`;
}

// ════════════════════════════════════════
// State
// ════════════════════════════════════════
let S={
  screen:"lock",pwError:false,currentUser:"",
  projectName:"",projectAddress:"",inspDate:"",
  supervisorName:"",testerName:"",builderName:"",
  selectedIds:new Set(),photos:{},locations:{},currentIdx:0,
  processing:false,downloading:false,
  projectHistory:undefined,photoStatus:{},
};
function normDate(v){if(!v)return"";const m=v.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);return m?`${m[1]}.${m[2].padStart(2,"0")}.${m[3].padStart(2,"0")}`:v;}
function hasPics(id){return(S.photos[id]||[]).length>0;}
function isPrev(id){return!!(S.photoStatus[id]?.done&&!hasPics(id));}

// ════════════════════════════════════════
// localStorage
// ════════════════════════════════════════
function tryLoadHistory(){
  try{const r=localStorage.getItem("fireseq-tp-projects");S.projectHistory=r?JSON.parse(r):null;}
  catch(e){S.projectHistory=null;}render();
}
function saveHistory(d){
  try{
    const prev=Array.isArray(S.projectHistory)?S.projectHistory:[];
    const next=[d,...prev.filter(h=>!(h.projectName===d.projectName&&h.projectAddress===d.projectAddress))].slice(0,5);
    localStorage.setItem("fireseq-tp-projects",JSON.stringify(next));S.projectHistory=next;
  }catch(e){}
}
function applyHistory(idx){
  if(idx==="")return;
  const h=S.projectHistory?.[Number(idx)];if(!h)return;
  Object.assign(S,h);render();
}
function psKey(){return"fireseq-tp-ps-"+S.projectName+"_"+S.inspDate;}
function loadPS(){try{const r=localStorage.getItem(psKey());S.photoStatus=r?JSON.parse(r):{};}catch(e){S.photoStatus={};}}
function markDone(id){try{S.photoStatus[id]={done:true};localStorage.setItem(psKey(),JSON.stringify(S.photoStatus));}catch(e){}}

  if(p.get("r"))  S.testerName=p.get("r");

  if(p.get("pw")){const u=USERS[p.get("pw")];if(u){S.currentUser=u;S.screen="project";}}
  history.replaceState({},"",location.pathname);
}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;
  };
}
async function addWM(file,ds){
  return new Promise(res=>{
    const img=new Image(),tmp=URL.createObjectURL(file);
    img.onload=()=>{
      const c=document.createElement("canvas");c.width=img.naturalWidth;c.height=img.naturalHeight;
      const ctx=c.getContext("2d");ctx.drawImage(img,0,0);URL.revokeObjectURL(tmp);
      const le=Math.max(img.naturalWidth,img.naturalHeight);
      const fs=Math.max(Math.round(le*0.028),18);
      ctx.font=`bold ${fs}px 'Courier New',Courier,monospace`;ctx.textBaseline="bottom";
      const tw=ctx.measureText(ds).width,mg=Math.round(le*0.012);
      const tx=img.naturalWidth-tw-mg,ty=img.naturalHeight-mg;
      ctx.save();ctx.lineWidth=Math.max(Math.round(fs*0.18),2);ctx.lineJoin="round";
      ctx.strokeStyle="rgba(0,0,0,0.95)";ctx.strokeText(ds,tx,ty);
      ctx.fillStyle="#FFFFFF";ctx.fillText(ds,tx,ty);ctx.restore();
      c.toBlob(blob=>res({url:URL.createObjectURL(blob),blob}),"image/jpeg",0.95);
    };
    img.onerror=()=>res(null);img.src=tmp;
  });
}
async function handleCapture(input){
  const file=input.files?.[0];if(!file)return;
  const items=getSelected(),item=items[S.currentIdx];if(!item)return;
  const locEl=document.getElementById("locIn");if(locEl)S.locations[item.id]=locEl.value;
  S.processing=true;render();
  const r=await addWM(file,S.inspDate);S.processing=false;
  const idx=S.currentIdx,baseF=makeFname(item,idx);
  const existing=S.photos[item.id]||[];
  const fn=existing.length===0?baseF:`${baseF}_${existing.length+1}`;
  S.photos[item.id]=[...existing,{url:r?r.url:URL.createObjectURL(file),blob:r?.blob,name:fn,folder:getFolder(item)}];
  markDone(item.id);
  if(existing.length===0&&S.currentIdx<items.length-1)S.currentIdx++;
  input.value="";render();
}
function removePic(id,pi){
  const arr=S.photos[id]||[];arr.splice(pi,1);
  if(arr.length)S.photos[id]=arr;else delete S.photos[id];render();
}
function navShoot(dir){
  const locEl=document.getElementById("locIn"),items=getSelected(),item=items[S.currentIdx];

function openShareModal(id,pi=0){
  const pics=S.photos[id]||[];const p=pics[pi]||pics[0];if(!p)return;
  document.getElementById("shareModal")?.remove();
  const m=document.createElement("div");m.id="shareModal";m.className="share-modal";
  const canShare=navigator.share&&navigator.canShare&&p.blob;
  m.innerHTML=`
    <div style="color:#fff;font-size:13px;font-weight:700;margin-bottom:10px;text-align:center">${p.name}.jpg</div>
    <img src="${p.url}" style="max-width:100%;max-height:52vh;border-radius:10px;object-fit:contain;box-shadow:0 4px 24px rgba(0,0,0,0.5)">
    <div style="background:rgba(255,255,255,0.12);border-radius:8px;padding:8px 14px;margin:10px 0;text-align:center;color:#fff;font-size:12px;line-height:1.9">
      📱 手機：長按圖片 → 儲存至相簿<br>💻 電腦：右鍵圖片 → 另存圖片為…
    </div>
    <div class="share-btns">
      ${canShare?`<button class="sb" style="background:#25D366;font-size:13px;padding:9px 18px" onclick="nativeShare('${id}',${pi})">📤 分享 / LINE</button>`:""}
      <button class="sb" style="background:#555;font-size:13px;padding:9px 18px" onclick="document.getElementById('shareModal').remove()">✕ 關閉</button>
    </div>`;
  m.addEventListener("click",e=>{if(e.target===m)m.remove();});
  document.body.appendChild(m);
}
async function nativeShare(id,pi){
  const p=(S.photos[id]||[])[pi];if(!p||!p.blob)return;
  try{const f=new File([p.blob],p.name+".jpg",{type:"image/jpeg"});
    if(navigator.canShare({files:[f]})){await navigator.share({files:[f],title:p.name});return;}
  }catch(e){if(e.name==="AbortError")return;}
  alert("此裝置不支援直接分享，請長按圖片儲存");
}

      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600">${String(idx+1).padStart(2,"0")}. ${item.name}</div>
        <div style="font-size:10px;color:#999">${item.category}${item.sub?" ▸ "+item.sub:""}</div>
        ${cnt>0?`<div style="font-size:10px;color:#1a472a">📁 ${getFolder(item)} ／ ${cnt}張</div>`:""}
      </div>
      ${cnt>0?`<button class="sb" style="background:#1a472a;flex-shrink:0;font-size:11px;padding:5px 9px" onclick="openShareModal('${item.id}',0)">💾</button>`:""}
    </div>`;
  });
  if(missing.length){
    h+=`<div class="card warn"><div class="warn-t">⚠ 尚有 ${missing.length} 項未拍攝</div>`;
    missing.forEach(m=>{h+=`<div class="warn-i">• ${m.name}</div>`;});
    h+=`<button class="sb" style="background:#c0392b;margin-top:8px" onclick="goToMissing()">繼續拍攝未完成項目</button></div>`;
  }
  h+=`<div class="bstack">
    ${S.downloading?`<div class="proc">⏳ 處理中，請稍候…</div>`:`
    <button class="mbtn" style="background:#c0392b;font-size:15px" onclick="generatePasteTable()">📋 產生照片黏貼表（可列印）</button>
    <button class="mbtn green" onclick="saveToDirectory()">📂 選擇資料夾下載（各設備分資料夾）</button>
    <button class="mbtn" onclick="downloadZip()">📦 ZIP 下載（各設備資料夾打包）</button>
    <button class="mbtn dark" onclick="exportJSON()">📄 匯出清單 JSON</button>`}
    <div class="nav-row">
      <button class="nb-btn" onclick="S.screen='shoot';render()">← 返回拍照</button>
      <button class="nb-btn" onclick="S.screen='select';render()" style="background:#fdf2f2;color:var(--red);border-color:#f5c6c6">📋 修改選項</button>
    </div>
    <div class="nav-row">
      <button class="nb-btn" onclick="S.screen='project';render()">✏️ 修改案件</button>
      <button class="nb-btn" style="color:#c0392b;border-color:#e8b0b0"
        onclick="if(confirm('清除所有已拍照片，確定嗎？')){S.selectedIds=new Set();S.photos={};S.locations={};S.screen='project';render()}">🔄 重新開始</button>
    </div>
  </div>`;
  el.innerHTML=h;
}
function goToMissing(){const items=getSelected(),idx=items.findIndex(i=>!hasPics(i.id));if(idx>=0){S.currentIdx=idx;S.screen="shoot";render();}}

// ── 產生黏貼表 ───────────────────────────
function generatePasteTable(){
  const items=getSelected();
  const rows=[];
  items.forEach((item)=>{
    const pics=S.photos[item.id]||[];
    if(pics.length>0){
      pics.forEach((p,pi)=>{
        rows.push({label:item.name+(pics.length>1?`（第${pi+1}張）`:""),url:p.url});
      });
    }else{
      rows.push({label:item.name,url:null});
    }
  });

  // A4 橫向，每頁 4 張（2列×2欄）
  // 結構：[說明左｜照片左｜照片右｜說明右]
  const perPage=4;
  const pages=[];
  for(let i=0;i<rows.length;i+=perPage)pages.push(rows.slice(i,i+perPage));
  const totalPages=pages.length;
  const footerCase=`${S.projectName} ${S.inspDate.replace(/\./g,"")}`;

  let html=`<!DOCTYPE html><html lang="zh-TW"><head>
  <meta charset="UTF-8">
  <title>照片黏貼表 — ${S.projectName}</title>
  <style>
    @page{size:A4 landscape;margin:8mm 10mm;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#fff;color:#000;}

    .page{width:100%;display:flex;flex-direction:column;height:195mm;page-break-after:always;}
    .page:last-child{page-break-after:avoid;}

    /* 頁首 */
    .ph{text-align:center;font-size:18px;font-weight:900;letter-spacing:3px;
        padding-bottom:5px;margin-bottom:5px;border-bottom:1.5px solid #000;}

    /* 主體表格 */
    .grid{flex:1;display:grid;
          grid-template-columns:32px 1fr 1fr 32px;
          grid-template-rows:1fr 1fr;
          border:1.5px solid #000;
          border-collapse:collapse;
          min-height:0;}

    /* 行：每行佔用 col1~col4，但我們用子格 */
    .row{display:contents;}

    /* 說明欄（直排文字）*/
    .lbl{border:1px solid #000;
         writing-mode:vertical-lr;
         text-orientation:mixed;
         font-size:12px;font-weight:700;
         display:flex;align-items:center;justify-content:flex-start;
         padding:6px 4px;
         line-height:1.6;
         word-break:break-all;
         background:#fff;}

    /* 照片欄 */
    .photo{border:1px solid #000;
           display:flex;align-items:center;justify-content:center;
           overflow:hidden;padding:2px;background:#fff;}
    .photo img{max-width:100%;max-height:100%;object-fit:contain;}

    /* 空白格（對角線） */
    .empty-cell{border:1px solid #000;position:relative;background:#fff;}
    .empty-cell::before,.empty-cell::after{
      content:"";position:absolute;
      top:0;left:0;right:0;bottom:0;}
    .empty-cell::before{
      background:linear-gradient(to bottom right,transparent calc(50% - 0.5px),#999 calc(50% - 0.5px),#999 calc(50% + 0.5px),transparent calc(50% + 0.5px));}

    /* 頁尾 */
    .pf{display:flex;justify-content:space-between;
        font-size:10px;color:#333;
        padding-top:4px;margin-top:4px;
        border-top:1px solid #ccc;}

    @media print{
      *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
      .no-print{display:none!important;}
    }
  </style>
</head><body>`;

  pages.forEach((pageRows,pi)=>{
    // 4個格子：[0]=左上 [1]=右上 [2]=左下 [3]=右下
    const c=(i)=>pageRows[i]||null;

    const photoCell=(r)=>{
      if(!r)return`<div class="empty-cell"></div>`;
      if(r.url)return`<div class="photo"><img src="${r.url}"></div>`;
      return`<div class="empty-cell"></div>`;
    };
    const lblCell=(r,extraStyle="")=>{
      if(!r)return`<div class="lbl" style="${extraStyle}">&nbsp;</div>`;
      return`<div class="lbl" style="${extraStyle}">${r.label}</div>`;
    };

    html+=`<div class="page">
    <div class="ph">臺北市政府消防局　消防安全設備照片黏貼紙</div>
    <div class="grid">
      ${/* 上列：說明左 | 照片左 | 照片右 | 說明右 */""}
      ${lblCell(c(0))}
      ${photoCell(c(0))}
      ${photoCell(c(1))}
      ${lblCell(c(1))}
      ${/* 下列 */""}
      ${lblCell(c(2))}
      ${photoCell(c(2))}
      ${photoCell(c(3))}
      ${lblCell(c(3))}
    </div>
    <div class="pf">
      <span>${pi+1}/${totalPages}</span>
      <span>${footerCase}</span>
    </div>
    </div>`;
  });

  html+=`<div class="no-print" style="position:fixed;bottom:20px;right:20px;z-index:999">
    <button onclick="window.print()"
      style="padding:12px 28px;background:#c0392b;color:#fff;border:none;border-radius:8px;
             font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.25)">
      🖨️ 列印 / 儲存 PDF
    </button>
  </div></body></html>`;

  const w=window.open("","_blank");
  w.document.write(html);
  w.document.close();
}

async function saveToDirectory(){
  const items=getSelected(),done=items.filter(i=>hasPics(i.id));
  if(!done.length){alert("尚無已拍攝的照片");return;}
  if(!window.showDirectoryPicker){alert("此瀏覽器不支援選擇資料夾\n改用 ZIP 下載");return downloadZip();}
  let dir;
  try{dir=await window.showDirectoryPicker({mode:"readwrite"});}
  catch(e){if(e.name==="AbortError")return;return downloadZip();}
  S.downloading=true;render();
  try{
    let cnt=0;
    for(const item of done){
      for(const p of S.photos[item.id]||[]){
        let blob=p.blob;
        if(!blob){try{const r=await fetch(p.url);blob=await r.blob();}catch(e){continue;}}
        const fh=await dir.getDirectoryHandle(p.folder||getFolder(item),{create:true});
        const wh=await fh.getFileHandle(p.name+".jpg",{create:true});
        const w=await wh.createWritable();await w.write(blob);await w.close();cnt++;
      }
    }
    alert(`✅ 已儲存 ${cnt} 張，各設備資料夾已建立`);
  }catch(e){alert("儲存失敗："+e.message);downloadZip();}
  S.downloading=false;render();
}

async function downloadZip(){
  const items=getSelected(),done=items.filter(i=>hasPics(i.id));
  if(!done.length){alert("尚無已拍攝的照片");return;}
  S.downloading=true;render();
  try{
    const zip=new JSZip();
    for(const item of done){
      for(const p of S.photos[item.id]||[]){
        let blob=p.blob;
        if(!blob){try{const r=await fetch(p.url);blob=await r.blob();}catch(e){continue;}}
        zip.folder(p.folder||getFolder(item)).file(p.name+".jpg",blob);
      }
    }
    const content=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const url=URL.createObjectURL(content);
    const a=document.createElement("a");a.href=url;
    a.download=`消防序拍_台北市_${S.projectName}_${S.inspDate}.zip`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  }catch(e){alert("ZIP 失敗："+e.message);}
  S.downloading=false;render();
}

function exportJSON(){
  const items=getSelected();
  const obj={appName:"消防序拍 V1.0",city:"台北市（非新建案）",operator:S.currentUser,
    project:{name:S.projectName,address:S.projectAddress,inspDate:S.inspDate,
      supervisor:S.supervisorName,tester:S.testerName,builder:S.builderName},
    photos:items.map((item,idx)=>{
      const pics=S.photos[item.id]||[];const baseF=makeFname(item,idx);
      return{seq:idx+1,folder:getFolder(item),label:item.name,
        files:pics.length?pics.map(p=>p.name+".jpg"):[baseF+".jpg"],
        location:S.locations[item.id]||"",status:pics.length?"captured":"missing",count:pics.length};
    }),
    summary:{total:items.length,captured:items.filter(i=>hasPics(i.id)).length,
      missing:items.filter(i=>!hasPics(i.id)).length,
      totalPhotos:items.reduce((s,i)=>s+(S.photos[i.id]||[]).length,0)}};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=`台北市照片清單_${S.projectName}.json`;
  document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),300);
}

applyUrlParams();
render();
</script>
